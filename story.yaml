intro:
  title: "Spielt die Reihenfolge eine Rolle?"
  heading: "<span class='ei'>🛸</span> Das Alien-Baby an der Tür"
  paragraphs:
    - "Du machst dich bereit, nach draußen zu gehen. Das <em>Alien-Baby</em> schaut dich verwundert an und fragt: \"Warum brauchst du das?\""
    - "\"Draußen ist es ein bisschen kalt, also brauche ich eine Jacke\", antwortest du."
    - "\"Und was ist damit?\" fragt es wieder."
    - "\"Das sind Schuhe. Ich brauche sie, um draußen im Regen oder Schnee zu laufen\", antwortest du. \"Und das ist mein Rucksack für die Schule\", fügst du hinzu."
    - "\"Warum ziehst du das eine <b>zuerst</b> und dann das andere an? Wenn ich rausgehen möchte, muss ich dann genau dieselbe <b>Reihenfolge</b> beim Anziehen einhalten?\" fragt das <em>Alien-Baby</em>."
    - "\"Hmm, das kommt ganz darauf an. Manchmal kann man Sachen in einer beliebigen <b>Reihenfolge</b> anziehen, und manchmal muss man das eine vor dem anderen anziehen\", erklärst du."
    - "Du lächelst. \"Lass es mich dir zeigen!\" Einige Dinge müssen in einer bestimmten <b>Reihenfolge</b> passieren, andere nicht. Herauszufinden, was was ist, ist genau das, worüber Leute, die mit Computern arbeiten, jeden Tag nachdenken."
  name_label: "✏️ Gib deinem Alien-Freund einen Namen:"
  name_placeholder: "z.B. Zorp, Pip, Nova…"
  name_greeting: "👾 Hallo, {name}! Bereit, etwas über Reihenfolgen zu lernen?"
  alien_asks_label: "{name} fragt…"
  next_button: "Lass es uns herausfinden! 🔍"

scene_caption:
  q1: "Also, Jacke zuerst? Oder Schuhe zuerst? Spielt das eine Rolle?"
  q2: "Wie ist es mit Socken und Schuhen? Gleiche Frage, was kommt zuerst?"
  q3: "Und der Rucksack! Wann zieht man den Rucksack an?"

questions:
  counter_label: "Frage {n} von {total}"
  next_label: "Nächste Frage →"
  next_final: "Schau, was wir gelernt haben! 🎓"

  q1:
    question: "Jacke <b>zuerst</b>, oder Schuhe <b>zuerst</b>?"
    subtitle: "Du möchtest nach draußen gehen. Du musst deine Jacke UND deine Schuhe anziehen. Ändert die <b>Reihenfolge</b>, in der du das tust, irgendetwas? Was denkst du, <em>{name}</em>?"
    options:
      shoes:
        label: "Schuhe zuerst, dann Jacke"
        why: "Das funktioniert! Schuhe an, dann Jacke an. Kein Problem."
      jacket:
        label: "Jacke zuerst, dann Schuhe"
        why: "Das funktioniert perfekt! Jacke an, dann Schuhe an. Ganz einfach."
      nodiff:
        label: "Kein Unterschied, beides geht!"
        why: "Genau! Beide <b>Reihenfolgen</b> führen zum gleichen Ergebnis."
    feedback_correct: "Richtig, <em>{name}</em>! 🎉 Die <b>Reihenfolge</b> dieser beiden Schritte ist EGAL."
    feedback_wrong: "Fast, <em>{name}</em>! Überlege mal: Kannst du deine Jacke noch anziehen, wenn du deine Schuhe schon anhast?"
    concept: "commutative"
    concept_label: "🔀 <b>Reihenfolge</b> ist hier egal"

  q2:
    question: "Socken <b>zuerst</b>, oder Schuhe <b>zuerst</b>?"
    subtitle: "Jetzt überlege genau, <em>{name}</em>. Du brauchst Socken UND Schuhe. Wenn du deine Schuhe <b>zuerst</b> anziehst und dann versuchst, Socken darüber zu ziehen... was passiert dann?"
    options:
      socks:
        label: "Socken zuerst, dann Schuhe"
        why: "Richtig! Socken kommen <b>zuerst</b> dran, dann die Schuhe darüber. Das ist die einzige <b>Reihenfolge</b>, die funktioniert."
      shoes:
        label: "Schuhe zuerst, dann Socken"
        why: "Oh-oh! Wenn deine Schuhe schon an sind, kannst du keine Socken mehr darunter ziehen. Du müsstest die Schuhe <b>zuerst</b> wieder ausziehen, was zusätzliche Arbeit bedeutet!"
      nodiff:
        label: "Kein Unterschied!"
        why: "Es macht hier einen Unterschied! Stell dir vor, du ziehst Schuhe an nackten Füßen an und versuchst dann, Socken darüber zu ziehen."
    feedback_correct: "Ganz genau, <em>{name}</em>! <span class='ei'>🧦</span> Wenn du versuchst, Socken nach den Schuhen anzuziehen, passen sie nicht mehr darunter. Du MUSST die Socken <b>zuerst</b> anziehen. Die <b>Reihenfolge</b> ist hier wichtig. Du kannst diese beiden Schritte nicht einfach tauschen."
    feedback_wrong: "Hmm, überlege genau, <em>{name}</em>! Stell dir vor, deine Schuhe sind schon fest an deinen Füßen zugeschnürt. Kannst du dann noch Socken anziehen? Was müsstest du tun? Die <b>Reihenfolge</b> ist hier wichtig."
    concept: "ordered"
    concept_label: "⚠️ <b>Reihenfolge</b> ist hier wichtig"

  q3:
    question: "Jacke <b>zuerst</b>, oder Rucksack <b>zuerst</b>?"
    subtitle: "Die letzte Frage, <em>{name}</em>! Du musst deine Jacke UND deinen Rucksack anziehen. Der Rucksack kommt mit Trägern über deine Schultern. Ist es egal, was <b>zuerst</b> drankommt?"
    options:
      jacket:
        label: "Jacke zuerst, dann Rucksack"
        why: "Richtig! Jacke <b>zuerst</b> an, dann kommen die Träger darüber."
      backpack:
        label: "Rucksack zuerst, dann Jacke"
        why: "Knifflig! Die Träger würden dich daran hindern, in deine Jacke zu schlüpfen."
      nodiff:
        label: "Kein Unterschied!"
        why: "Es macht einen Unterschied! Stell dir vor, du versuchst, eine Jacke über dicke Rucksackträger zu ziehen."
    feedback_correct: "Genau richtig, <em>{name}</em>! 🎒 Die Jacke kommt <b>zuerst</b> an. Auch hier ist die <b>Reihenfolge</b> wichtig."
    feedback_wrong: "Nicht ganz, <em>{name}</em>! Könntest du eine Jacke über einen Rucksack ziehen, ohne ihn vorher abzunehmen?"
    concept: "ordered"
    concept_label: "⚠️ <b>Reihenfolge</b> ist hier wichtig"

summary:
  heading: "<span class='ei'>🎓</span> Hier ist das, was <em>{name}</em> herausgefunden hat!"
  score_all: "<em>{name}</em> hat alle 3 direkt beim <b>ersten</b> Versuch richtig! <span class='ei'>🌟</span>"
  score_most: "<em>{name}</em> hat {score} von 3 richtig. Gut gemacht! <span class='ei'>🎉</span>"
  score_some: "<em>{name}</em> hat am Ende alle herausgefunden. Das ist das Wichtigste! <span class='ei'>💪</span>"
  answer_prefix: "Antwort:"
  commutative_heading: "<span class='ei'>✅</span> Wenn die <b>Reihenfolge</b> EGAL ist:"
  commutative_intro: "Diese Schritte nennt man kommutativ. Du kannst sie beliebig tauschen, das Ergebnis bleibt gleich."
  ordered_heading: "<span class='ei'>⚠️</span> Wenn die <b>Reihenfolge</b> WICHTIG ist:"
  ordered_intro: "Diese Schritte müssen in einer ganz bestimmten Reihenfolge ablaufen. Wenn du sie in der falschen <b>Reihenfolge</b> machst, funktioniert es nicht, oder es macht zumindest extra Arbeit!"
  cs_heading: "<span class='ei'>💻</span> Warum ist das in der Informatik wichtig?"
  cs_text: "Ein Computerprogramm ist eigentlich nur eine Liste von Schritten, ein <b>Algorithmus</b>. Jeder einzelne Schritt passiert in genau der <b>Reihenfolge</b>, die der Programmierer aufschreibt. Also muss ein Programmierer genau überlegen: Welche Schritte kann <em>{name}</em> in einer beliebigen <b>Reihenfolge</b> machen? Und welche Schritte MÜSSEN vor anderen passieren? Wenn man das falsch macht, funktioniert das Programm nicht – genau wie Socken und Schuhe in der falschen <b>Reihenfolge</b> anzuziehen ein Barfuß-Problem verursacht! Das ist eine der wichtigsten Fähigkeiten beim algorithmischen Denken: <b>Reihenfolge</b> und Abhängigkeiten zu verstehen."
  math_note: "Übrigens gibt es diese Idee auch in der Mathematik! 2 + 3 = 3 + 2 (Addition ist kommutativ, also ist die <b>Reihenfolge</b> egal). Aber 10 − 3 ist nicht dasselbe wie 3 − 10 (Subtraktion ist nicht kommutativ, also ist die <b>Reihenfolge</b> hier wichtig!)."
  restart_button: "🔄 Noch einmal von vorn versuchen"