intro:
  title: "Does the <b>Order</b> <span class='ei'>👔</span> Matter?"
  heading: "<span class='ei'>🛸</span> The Alien at the Door"
  paragraphs:
    - "You are getting ready to go out. The <em>baby alien</em> looks at you with wonder and asks, \"Why do you need that?\""
    - "\"It is a bit cold outside, so I need a jacket,\" you reply."
    - "\"Why are you putting that on <b>first</b> and then the other?\" the <em>baby alien</em> asks."
    - "You smile. \"Let me show you!\" Some things have to go in a certain <b>order</b>, and some things don't."
  name_label: "✏️ Give your alien friend a name:"
  name_placeholder: "e.g. Zorp, Pip, Nova…"
  name_greeting: "👾 Hello, <em>{name}</em>! Ready to learn about <b>order</b>?"
  alien_asks_label: "<em>{name}</em> asks…"
  next_button: "Let's find out! 🔍"

scene_caption:
  q1: "So, jacket <b>first</b>? Or shoes <b>first</b>? Does it matter?"
  q2: "What about socks and shoes? Same question, which one goes <b>first</b>?"
  q3: "And the backpack! When does the backpack go on?"

questions:
  counter_label: "Question {n} of {total}"
  next_label: "Next question →"
  next_final: "See what we learned! 🎓"

  q1:
    question: "Jacket <b>first</b>, or shoes <b>first</b>?"
    subtitle: "You want to go outside. Does the <b>order</b> you do it in change anything, <em>{name}</em>?"
    options:
      shoes:
        label: "Shoes first, then jacket"
        why: "This works! Shoes on, then jacket on. No problem."
      jacket:
        label: "Jacket first, then shoes"
        why: "This works perfectly! Jacket on, then shoes on. Easy."
      nodiff:
        label: "No difference, both work!"
        why: "Exactly! Both <b>orders</b> give the same result."
    feedback_correct: "Correct, <em>{name}</em>! 🎉 The <b>order</b> of these two steps does NOT matter."
    feedback_wrong: "Almost, <em>{name}</em>! Think: can you still put your jacket on if your shoes are already on?"
    concept: "commutative"
    concept_label: "🔀 <b>Order</b> doesn't matter here"

  q2:
    question: "Socks <b>first</b>, or shoes <b>first</b>?"
    subtitle: "You need both socks AND shoes. If you put your shoes on <b>first</b>... what happens?"
    options:
      socks:
        label: "Socks first, then shoes"
        why: "Correct! Socks go on <b>first</b>, then shoes on top."
      shoes:
        label: "Shoes first, then socks"
        why: "Uh-oh! You can't slide socks under shoes that are already on!"
      nodiff:
        label: "No difference!"
        why: "It does make a difference! Imagine putting socks over your shoes..."
    feedback_correct: "Exactly right, <em>{name}</em>! 🧦 You MUST put socks on <b>first</b>. The <b>order</b> here matters."
    feedback_wrong: "Hmm, think carefully, <em>{name}</em>! Can you add socks if your shoes are already tied tight?"
    concept: "ordered"
    concept_label: "⚠️ <b>Order</b> matters here"

  q3:
    question: "Jacket <b>first</b>, or backpack <b>first</b>?"
    subtitle: "The backpack goes over your shoulders. Does it matter which goes on <b>first</b>?"
    options:
      jacket:
        label: "Jacket first, then backpack"
        why: "Correct! Jacket on <b>first</b>, then the straps go over it."
      backpack:
        label: "Backpack first, then jacket"
        why: "Tricky! The straps would block you from sliding your jacket on."
      nodiff:
        label: "No difference!"
        why: "It does make a difference! Imagine slipping a jacket over thick backpack straps."
    feedback_correct: "Spot on, <em>{name}</em>! 🎒 Jacket goes on <b>first</b>. The <b>order</b> matters here too."
    feedback_wrong: "Not quite, <em>{name}</em>! Could you pull a jacket on over a backpack without taking it off?"
    concept: "ordered"
    concept_label: "⚠️ <b>Order</b> matters here"

summary:
  heading: "<span class='ei'>🎓</span> Here's What <em>{name}</em> Figured Out!"
  score_all: "<em>{name}</em> got all 3 right on the <b>first</b> try! 🌟"
  score_most: "<em>{name}</em> got {score} out of 3. Well done! 🎉"
  score_some: "<em>{name}</em> figured them all out in the end! 💪"
  answer_prefix: "Answer:"
  commutative_heading: "✅ When <b>order</b> does NOT matter:"
  commutative_intro: "These steps are called <b>commutative</b>. Swap them around, and the result is the same."
  ordered_heading: "⚠️ When <b>order</b> DOES matter:"
  ordered_intro: "These steps must happen in a specific sequence."
  cs_heading: "💻 Why does this matter in computer science?"
  cs_text: "A program is just an <b>algorithm</b>. A programmer must think: which steps can <em>{name}</em> put in any <b>order</b>? And which MUST come before others?"
  math_note: "By the way, math has this too! 2 + 3 = 3 + 2 (order doesn't matter), but 10 − 3 is not 3 − 10 (order matters!)."
  restart_button: "🔄 Try again from the start"